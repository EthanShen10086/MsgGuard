name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          helm template msgguard deploy/helm/msgguard \
            -f deploy/helm/msgguard/values-staging.yaml \
            -f deploy/helm/msgguard/values-mongodb.yaml \
            --set auth.secret="${{ secrets.STAGING_AUTH_SECRET || 'staging-placeholder-secret-32chars-min' }}" \
            | grep -q Deployment

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: |
          docker build -f deploy/Dockerfile.gateway -t msgguard/gateway:staging .
          docker build -f deploy/Dockerfile.model -t msgguard/model:staging .
          docker build -f deploy/Dockerfile.flywheel -t msgguard/flywheel:staging .

  deploy:
    needs: [validate, docker-build]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v5
      - name: Deploy to staging (optional)
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          STAGING_AUTH_SECRET: ${{ secrets.STAGING_AUTH_SECRET }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "::notice::Staging deploy skipped — set KUBE_CONFIG secret."
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
          helm upgrade --install msgguard deploy/helm/msgguard \
            -f deploy/helm/msgguard/values-staging.yaml \
            -f deploy/helm/msgguard/values-mongodb.yaml \
            --set image.tag=staging-${{ github.sha }} \
            --set auth.secret="${STAGING_AUTH_SECRET:-staging-placeholder-secret-32chars-min}" \
            -n msgguard-staging --create-namespace --wait --timeout 5m

  smoke:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Staging smoke (optional)
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          if [ -z "$STAGING_API_URL" ]; then
            echo "::notice::Smoke skipped — set STAGING_API_URL secret."
            exit 0
          fi
          curl -sf "$STAGING_API_URL/health" | grep -q ok
