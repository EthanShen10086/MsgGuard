name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  swift-packages:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: |
          for pkg in SharedModels DesignSystem FilterEngine BlocklistStore; do
            (
              cd "apps/ios/Packages/$pkg"
              if [ -d Tests ] && find Tests -name '*.swift' -print -quit | grep -q .; then
                swift test
              else
                swift build
              fi
            )
          done

  macos-mail:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: |
          xcodebuild -project apps/macos/MsgGuard-macOS.xcodeproj -scheme MsgGuardMailHost -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO build

  go-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: |
          git clone --depth 1 https://github.com/EthanShen10086/voxera-kit.git ../voxera-kit || true
      - run: |
          cd pkg/adapters && go mod tidy && go build ./...
          cd ../httpauth && go build ./... && go test ./...
          cd ../app && go build ./...
          cd ../../services/gateway && go mod tidy && go build ./cmd/server
          cd ../model && go build ./cmd/server
          cd ../admin && go build ./cmd/server
          cd ../flywheel && go build ./cmd/worker

  admin-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd apps/admin && npm ci && npm run build

  helm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          helm template msgguard deploy/helm/msgguard | grep -q Deployment
          helm template msgguard deploy/helm/msgguard -f deploy/helm/msgguard/values-mongodb.yaml | grep -q mongodb

  ml-benchmark:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          make data
          make train-all-locales
          make export-all-locales
          make benchmark
        working-directory: ml
      - run: |
          test -f ml/output/zh-Hans/spam_classifier.mlmodel
          test -f ml/output/en-US/spam_classifier.mlmodel
          test $(stat -c%s ml/output/zh-Hans/spam_classifier.mlmodel) -gt 512
