name: Build & Test

on:
  push:
    branches: [main, master, staging]
  pull_request:
    branches: [main, master, staging]

env:
  VOXERA_KIT_SHA: ${{ vars.VOXERA_KIT_SHA || '58be0db49ee7623b0d05a9df2b0fefcc0d73f6d2' }}

jobs:
  swift-packages:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: |
          for pkg in SharedModels DesignSystem FilterEngine BlocklistStore; do
            (
              cd "apps/ios/Packages/$pkg"
              if [ -d Tests ] && find Tests -name '*.swift' -print -quit | grep -q .; then
                swift test
              else
                swift build
              fi
            )
          done

  macos-mail:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: |
          xcodebuild -project apps/macos/MsgGuard-macOS.xcodeproj -scheme MsgGuardMailHost -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO build

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Read voxera-kit pin
        id: kitpin
        run: echo "sha=$(cat .github/voxera-kit-pin)" >> "$GITHUB_OUTPUT"
      - name: Checkout voxera-kit (pinned)
        run: |
          git clone https://github.com/EthanShen10086/voxera-kit.git ../voxera-kit
          cd ../voxera-kit && git checkout "${{ steps.kitpin.outputs.sha }}"
      - name: Go test (race)
        run: |
          cd pkg/adapters/memory && go test -race ./...
          cd "$GITHUB_WORKSPACE/pkg/httpauth" && go test -race ./...
          cd "$GITHUB_WORKSPACE/services/gateway/internal/handler" && go test -race ./...
      - name: Go build all services
        env:
          GOWORK: ${{ github.workspace }}/go.work
        run: |
          for svc in gateway model admin rules classify feedback flywheel; do
            echo "=== build $svc ==="
            (cd "services/$svc" && go build ./...)
          done
          for pkg in app adapters httpauth; do
            (cd "pkg/$pkg" && go build ./...)
          done

  admin-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd apps/admin && npm ci && npm run build

  helm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v5
      - run: |
          helm template msgguard deploy/helm/msgguard | grep -q Deployment
          helm template msgguard deploy/helm/msgguard -f deploy/helm/msgguard/values-mongodb.yaml | grep -q mongodb

  ml-benchmark:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          make data
          make train-all-locales
          make export-all-locales
          make benchmark
          pytest benchmark/test_gate.py -q
        working-directory: ml
      - run: |
          test -f ml/output/zh-Hans/spam_classifier.mlmodel
          test -f ml/output/en-US/spam_classifier.mlmodel
          test $(stat -c%s ml/output/zh-Hans/spam_classifier.mlmodel) -gt 512
      - uses: actions/upload-artifact@v4
        with:
          name: ml-output
          path: ml/output/
          retention-days: 1

  verify:
    needs: [go-test, ml-benchmark, helm-template]
    runs-on: ubuntu-latest
    env:
      CI: "true"
      SKIP_IOS: "true"
      SKIP_SMOKE: "true"
      GOWORK: ${{ github.workspace }}/go.work
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ml-output
          path: ml/output
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: azure/setup-helm@v5
      - name: Read voxera-kit pin
        id: kitpin
        run: echo "sha=$(cat .github/voxera-kit-pin)" >> "$GITHUB_OUTPUT"
      - name: Checkout voxera-kit (pinned)
        run: |
          git clone https://github.com/EthanShen10086/voxera-kit.git ../voxera-kit
          cd ../voxera-kit && git checkout "${{ steps.kitpin.outputs.sha }}"
      - run: pip install -r requirements.txt
        working-directory: ml
      - run: bash scripts/verify.sh
