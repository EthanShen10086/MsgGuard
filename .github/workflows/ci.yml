name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  swift-packages:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: |
          for pkg in SharedModels DesignSystem FilterEngine BlocklistStore; do
            cd apps/ios/Packages/$pkg && swift test
          done

  go-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: |
          git clone --depth 1 https://github.com/EthanShen10086/voxera-kit.git ../voxera-kit || true
      - run: |
          cd pkg/adapters && go mod tidy && go build ./...
          cd ../httpauth && go build ./... && go test ./...
          cd ../app && go build ./...
          cd ../../services/gateway && go mod tidy && go build ./cmd/server
          cd ../model && go build ./cmd/server
          cd ../admin && go build ./cmd/server

  helm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          helm template msgguard deploy/helm/msgguard | rg -q Deployment
          helm template msgguard deploy/helm/msgguard -f deploy/helm/msgguard/values-mongodb.yaml | rg -q mongodb

  ml-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -r requirements.txt
          make data
          make train
          make benchmark
        working-directory: ml
