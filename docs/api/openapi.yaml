openapi: 3.0.3
info:
  title: MsgGuard API
  version: 1.0.0
  description: Rules, models, classify, feedback, analytics, shadow endpoints
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: ok
  /api/v1/classify:
    post:
      summary: Classify SMS (sync)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassifyRequest"
      responses:
        "200":
          description: Classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResponse"
  /api/v1/classify/defer:
    post:
      summary: Classify for Message Filter defer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassifyRequest"
      responses:
        "200":
          description: Defer action
  /api/v1/classify/shadow:
    post:
      summary: Shadow compare local vs cloud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassifyRequest"
      responses:
        "200":
          description: Shadow comparison
  /api/v1/auth/token:
    post:
      summary: Issue JWT token (dev/admin bootstrap)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string }
                roles: { type: array, items: { type: string } }
      responses:
        "200":
          description: Token pair
  /api/v1/auth/oidc/config:
    get:
      summary: OIDC SSO config for admin console
      responses:
        "200":
          description: enabled flag and login URL
  /api/v1/auth/oidc/login:
    get:
      summary: Redirect to identity provider (admin SSO)
      responses:
        "302":
          description: redirect to IdP
  /api/v1/auth/oidc/callback:
    get:
      summary: OIDC callback; redirects to admin UI with access_token
      responses:
        "302":
          description: redirect to ADMIN_UI_URL
  /api/v1/admin/metrics/summary:
    get:
      summary: Product metrics summary (admin)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Weekly metrics
        "401":
          description: unauthorized
  /api/v1/feedback:
    post:
      summary: Submit feedback
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "200":
          description: Created
    get:
      summary: List feedback (ML flywheel)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Feedback items
  /api/v1/analytics:
    post:
      summary: Ingest analytics event
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                props: { type: object }
      responses:
        "200":
          description: ok
  /api/v1/rules/latest:
    get:
      summary: Latest rule bundle
      responses:
        "200":
          description: Rules metadata
  /api/v1/models/latest:
    get:
      summary: Latest model metadata
      parameters:
        - name: locale
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Model metadata with ETag
  /api/v1/models/register:
    post:
      summary: Register model version (ML publish)
      responses:
        "201":
          description: registered
  /api/v1/auth/device:
    post:
      summary: Issue device-scoped JWT
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                device_id: { type: string }
                platform: { type: string }
      responses:
        "200":
          description: Device token pair
        "403":
          description: device token disabled
  /api/v1/entitlements/verify:
    post:
      summary: Verify App Store signed transaction and link subscription
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                signed_transaction: { type: string }
                device_id: { type: string }
      responses:
        "200":
          description: Entitlement active
        "401":
          description: unauthorized
  /api/v1/entitlements/status:
    get:
      summary: Subscription status for device
      parameters:
        - name: device_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Subscription state
  /api/v1/webhooks/appstore:
    post:
      summary: App Store Server Notifications V2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                signedPayload: { type: string }
      responses:
        "200":
          description: accepted
  /api/v1/privacy/me:
    delete:
      summary: Delete user data (GDPR)
      security:
        - BearerAuth: []
      responses:
        "204":
          description: deleted
        "401":
          description: unauthorized
  /api/v1/admin/models/promote:
    post:
      summary: Promote model version to production
      security:
        - BearerAuth: []
      responses:
        "200":
          description: promoted
  /api/v1/admin/models/rollback:
    post:
      summary: Roll back model to previous version
      security:
        - BearerAuth: []
      responses:
        "200":
          description: rolled back
  /api/v1/admin/flags:
    get:
      summary: List feature flags
      security:
        - BearerAuth: []
      responses:
        "200":
          description: flags
    put:
      summary: Update feature flag
      security:
        - BearerAuth: []
      responses:
        "200":
          description: updated
  /api/v1/admin/quota/whitelist:
    post:
      summary: Add device to AI quota whitelist
      security:
        - BearerAuth: []
      responses:
        "200":
          description: whitelisted
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ClassifyRequest:
      type: object
      properties:
        sender: { type: string }
        body: { type: string }
        user_id: { type: string }
    ClassifyResponse:
      type: object
      properties:
        action: { type: string, enum: [allow, junk, promotion, none] }
        category: { type: string }
        confidence: { type: number }
        cached: { type: boolean }
    FeedbackRequest:
      type: object
      properties:
        body: { type: string }
        label: { type: string }
        locale: { type: string }
        traceID: { type: string }
