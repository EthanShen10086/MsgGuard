name: MsgGuard-macOS
options:
  bundleIdPrefix: com.ethanshen.msgguard
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  SharedModels:
    path: ../ios/Packages/SharedModels
  FilterEngine:
    path: ../ios/Packages/FilterEngine

targets:
  MsgGuardMailHost:
    type: application
    platform: macOS
    sources:
      - path: MailHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.msgguard.mailhost
        INFOPLIST_FILE: MailHost/Info.plist
        CODE_SIGN_ENTITLEMENTS: MailHost/MailHost.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: MailExtension
        embed: true

  MailExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: MailExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.msgguard.mailhost.filter
        INFOPLIST_FILE: MailExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: MailExtension/MailExtension.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SharedModels
      - package: FilterEngine
    entitlements:
      path: MailExtension/MailExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.ethanshen.msgguard
        com.apple.developer.mail-client: true

schemes:
  MsgGuardMailHost:
    build:
      targets:
        MsgGuardMailHost: all
        MailExtension: all
    run:
      config: Debug
  MailExtension:
    build:
      targets:
        MailExtension: all
    run:
      config: Debug
