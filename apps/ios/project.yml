name: MsgGuard
options:
  bundleIdPrefix: com.ethanshen.msgguard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
    - Base

packages:
  SharedModels:
    path: Packages/SharedModels
  DesignSystem:
    path: Packages/DesignSystem
  FilterEngine:
    path: Packages/FilterEngine
  BlocklistStore:
    path: Packages/BlocklistStore

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MsgGuard-iOS:
    type: application
    platform: iOS
    sources:
      - path: App/Shared
      - path: App/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.msgguard
        INFOPLIST_FILE: App/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/iOS/MsgGuard.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SharedModels
      - package: DesignSystem
      - package: FilterEngine
      - package: BlocklistStore
      - target: MessageFilterExtension
      - target: MsgGuardWidget
      - target: CallDirectoryExtension
    entitlements:
      path: App/iOS/MsgGuard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ethanshen.msgguard
        com.apple.developer.associated-domains:
          - messagefilter:api.msgguard.app

  MessageFilterExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MessageFilterExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.msgguard.filter
        INFOPLIST_FILE: MessageFilterExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: SharedModels
      - package: FilterEngine
    entitlements:
      path: App/iOS/MsgGuard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ethanshen.msgguard

  MsgGuardWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: MsgGuardWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.msgguard.widget
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: MsgGuardWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: SharedModels
    entitlements:
      path: App/iOS/MsgGuard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ethanshen.msgguard

  CallDirectoryExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: CallDirectoryExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.msgguard.calldirectory
        INFOPLIST_FILE: CallDirectoryExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: CallDirectoryExtension/CallDirectory.entitlements
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: SharedModels

schemes:
  MsgGuard-iOS:
    build:
      targets:
        MsgGuard-iOS: all
        MessageFilterExtension: all
        MsgGuardWidget: all
        CallDirectoryExtension: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
