services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: msgguard
      POSTGRES_PASSWORD: msgguard
      POSTGRES_DB: msgguard
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: msgguard
      MONGO_INITDB_ROOT_PASSWORD: msgguard
    ports: ["27017:27017"]
    volumes:
      - mongodata:/data/db
  nats:
    image: nats:2-alpine
    ports: ["4222:4222"]
  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports: ["16686:16686", "4318:4318"]
  prometheus:
    image: prom/prometheus:v2.54.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9090:9090"]
  grafana:
    image: grafana/grafana:11.1.0
    ports: ["3000:3000"]
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    ports: ["8080:8080"]
    environment:
      CONFIG_PATH: /app/deploy/config.yaml
      AUTH_SECRET: msgguard-dev-secret
      DATABASE_DRIVER: ${DATABASE_DRIVER:-postgres}
      DATABASE_DSN: ${DATABASE_DSN:-postgres://msgguard:msgguard@postgres:5432/msgguard?sslmode=disable}
      REDIS_URL: redis://redis:6379
    depends_on: [postgres, mongodb, redis, jaeger]
  rules:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.rules
    ports: ["8081:8081"]
  model:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.model
    ports: ["8083:8083"]
    volumes:
      - ../ml/output:/app/ml/output:ro
      - ./models:/app/deploy/models
    environment:
      MODEL_STORAGE_PATH: /app/deploy/models
      AUTH_SECRET: msgguard-dev-secret

volumes:
  pgdata:
  mongodata:
