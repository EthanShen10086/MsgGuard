replicaCount: 2
image:
  repository: msgguard/gateway
  tag: latest
service:
  port: 8080
ingress:
  enabled: true
  host: api.msgguard.app
  mtls:
    enabled: false
    secretName: msgguard-mtls-ca
    authSecret: nginx.org/mtls-ca-secret
resources:
  requests:
    cpu: 100m
    memory: 128Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
database:
  driver: postgres
  dsn: ""
auth:
  secret: ""
redis:
  url: ""
  image: redis:7-alpine
nats:
  url: "nats://msgguard-nats:4222"
  image: nats:2.10-alpine
model:
  port: 8083
  image:
    repository: msgguard/model
    tag: latest
flywheel:
  image:
    repository: msgguard/flywheel
    tag: latest
security:
  mtlsAdminRequired: false
  mtlsClientHeader: ""
config:
  cloudLLM: false
certManager:
  enabled: false
  acmeServer: https://acme-v02.api.letsencrypt.org/directory
  email: ops@msgguard.app
  tlsSecretName: msgguard-tls
  clientCA:
    enabled: false
    secretName: msgguard-mtls-ca
    issuerName: ca-issuer
