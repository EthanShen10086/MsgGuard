replicaCount: 2
image:
  repository: msgguard/gateway
  tag: latest
service:
  port: 8080
ingress:
  enabled: true
  host: api.msgguard.app
  mtls:
    enabled: false
    secretName: msgguard-mtls-ca
    authSecret: nginx.org/mtls-ca-secret
resources:
  requests:
    cpu: 100m
    memory: 128Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
database:
  driver: postgres
  dsn: ""
auth:
  secret: ""
redis:
  url: ""
security:
  mtlsAdminRequired: false
  mtlsClientHeader: ""
config:
  cloudLLM: false
