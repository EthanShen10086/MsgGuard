{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}-ingress
  {{- if .Values.ingress.mtls.enabled }}
  annotations:
    {{ .Values.ingress.mtls.authSecret | default "nginx.org/mtls-ca-secret" }}: {{ .Values.ingress.mtls.secretName | quote }}
    nginx.org/mtls-auth-type: "client-cert"
  {{- end }}
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Chart.Name }}-gateway
                port:
                  number: {{ .Values.service.port }}
{{- end }}
