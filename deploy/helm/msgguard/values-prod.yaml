replicaCount: 3
env: production
ingress:
  host: api.msgguard.app
  waf:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/limit-rps: "50"
      nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
  mtls:
    enabled: false
    secretName: msgguard-mtls-ca
autoscaling:
  minReplicas: 3
  maxReplicas: 20
database:
  driver: postgres
  dsn: "postgres://msgguard:CHANGE_ME@postgres:5432/msgguard?sslmode=require"
auth:
  secret: "CHANGE_ME_PROD_AUTH"
redis:
  url: "redis://redis:6379"
security:
  mtlsAdminRequired: false
  mtlsClientHeader: "X-Client-Cert-Subject"
  authBootstrapEnabled: false
  deviceTokenEnabled: true
  modelDownloadAuth: true
  appAttestRequired: false
flywheel:
  minInterval: "1h"
  minBatch: "10"
oidc:
  issuer: ""
  clientId: ""
  clientSecret: ""
  redirectUrl: "https://api.msgguard.app/api/v1/auth/oidc/callback"
  adminEmails: ""
  adminDomain: "msgguard.app"
  enforceAdmin: true
  adminUiUrl: "https://admin.msgguard.app"
config:
  cloudLLM: true
certManager:
  enabled: true
  email: ops@msgguard.app
  clientCA:
    enabled: true
