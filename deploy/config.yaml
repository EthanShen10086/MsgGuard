features:
  cloud_llm: false
  crash_report_upload: false
  ip_whitelist_enabled: false
gateway:
  port: 8080
  rate_limit_rps: 100
  ip_whitelist: []
  rules_addr: "http://localhost:8081"
  classify_addr: "http://localhost:8082"
  model_addr: "http://localhost:8083"
  feedback_addr: "http://localhost:8084"
cache:
  redis_enabled: true
  rules_ttl: 3600
database:
  driver: postgres
  dsn: "postgres://msgguard:msgguard@localhost:5432/msgguard?sslmode=disable"
queue:
  driver: nats
  url: "nats://localhost:4222"
model:
  driver: filesystem
  path: "./deploy/models"
observability:
  trace_sample_rate: 1.0
  metrics_enabled: true
  otel_endpoint: "localhost:4318"
scheduler:
  rule_sync_cron: "0 */6 * * *"
llm:
  primary_provider: "qwen"
  fallback_provider: "deepseek"
  daily_quota_free: 10
